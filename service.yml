name: opensmtpd
icon: opensmtpd
type: service
title: OpenSMTPD
options:
- version: '7'
  tag: 7-1.28.0
endpoints:
- name: opensmtpd
  ports:
  - name: opensmtpd
    number: 25
    protocol: tcp
labels:
- opensmtpd
- smtp
- smtpd

volumes:
- name: spool
  title: Spool
  optional: true
  helm:
    labels: persistence.labels
    values:
    - name: persistence.enabled
      value: true
    - name: persistence.size
      value: '{{volumes.spool.size}}Gi'
    # mandatory to use existing claim since this volume will have import function
    # we will mount different claim after import and doing it through sts's volumeclaimtemplates is not supported
# disabled due to missing imports (required for this to work – we create PVC manually instead of using volumeClaimTemplate)
#    - name: primary.persistence.existingClaim
#      value: '{{volumes.spool.claim}}'

integrations:
- name: smtp
  title: Third-party SMTP server for Relay
  type: smtp

helm:
  name: wodby
  source: oci://registry-1.docker.io/wodby/opensmtpd
  chart: oci://registry-1.docker.io/wodby/opensmtpd
  version: 0.3.0

workloads:
- name: main
  selector:
    matchLabels:
      app.kubernetes.io/instance: '{{service.helm.release}}'
  kind: statefulset
  primary: true
  helm:
    labels: podLabels
    annotations: podAnnotations
    volumes: extraVolumes
  containers:
  - name: opensmtpd
    image: wodby/opensmtpd
    helm:
      resources: resources
      env: envVars
      mounts: extraVolumeMounts
